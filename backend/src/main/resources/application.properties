# ===============================
# Application
# ===============================
spring.application.name=Human_Resource_Website
server.port=8080

# ===============================
# MySQL Database
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql-service:3306/hrms
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# ===============================
# Logging
# ===============================
logging.level.com.quantumsoft.hrms.Human_Resource_Website.serviceImpl=DEBUG

# ===============================
# JWT
# ===============================
jwt.secret=mysupersecretkeyformyhrmsjwt1234567890
jwt.expiration=86400000

# ===============================
# Email Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ===============================
# SpringDoc Swagger
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===============================
# Spring
# ===============================
spring.main.allow-bean-definition-overriding=true
